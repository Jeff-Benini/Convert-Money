<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Convert Money</title>
</head>

<body>

    <img class="logo" src="./assets/logo.gif" alt="gif-logo">

    <main>

        <label class="label-currency-convert-from">
            <br>
            Converter <b>de</b>
            <select class="select-currency-convert-from">
                <option>R$ Real Brasileiro</option>
            </select>
            <br>
        </label>

        <br>

        <label class="label-currency-convert-to">
            <br>
            Converter <b>para</b>
            <select class="select-currency-convert-to">
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
            </select>
            <br>
        </label>

        <br>

        <label class="label-value">
            <br>
            Valor
            <input placeholder="R$ 0,00" type="number" class="input-value">
            <br>
        </label>

        <br>

        <button class="convert-button">Converter</button>

        <br>

        <section>
            <div class="div-results">

                <div class="div-currency-from">
                    <img src="./assets/real.png" alt="logo-moeda-a-converter">
                    <p class="currency-to-convert">Real</p>
                    <p class="value-to-convert">R$ 0,00</p>
                </div>

                    <br>

                    <img class="arrow" src="./assets/Vector.png" alt="logo-seta">

                    <br>

                <div class="div-currency-to">
                    <img class="logo-currency-to" src="./assets/dolar.png" alt="logo-moeda-convertida">
                    <p class="currency-converted">Dólar</p>
                    <p class="value-converted">US$ 0,00</p>
                </div>

            </div>
        </section>

    </main>

</body>
<script src="script.js"></script>

</html>
